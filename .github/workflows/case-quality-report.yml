name: Case Quality Report

on:
  workflow_dispatch:
    inputs:
      start_seed:
        description: First seed in the sampled range.
        required: false
        default: "1"
      count:
        description: Number of sampled seeds.
        required: false
        default: "25"
      target_clean_rate:
        description: Target clean rate as a decimal.
        required: false
        default: "0.60"
      triage_seeds:
        description: Optional comma-separated seed list for a focused triage rerun.
        required: false
        default: ""
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  case-quality-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Run sweep report
        id: sweep_report
        continue-on-error: true
        shell: bash
        env:
          START_SEED: ${{ inputs.start_seed || '1' }}
          COUNT: ${{ inputs.count || '25' }}
          TARGET_CLEAN_RATE: ${{ inputs.target_clean_rate || '0.60' }}
        run: |
          python scripts/sweep_case_quality.py \
            --start-seed "$START_SEED" \
            --count "$COUNT" \
            --target-clean-rate "$TARGET_CLEAN_RATE" \
            --fail-on-non-clean \
            > reports/case-quality-report.txt 2>&1

      - name: Run focused triage rerun
        if: ${{ inputs.triage_seeds != '' }}
        id: triage_rerun
        continue-on-error: true
        shell: bash
        env:
          TRIAGE_SEEDS: ${{ inputs.triage_seeds }}
          TARGET_CLEAN_RATE: ${{ inputs.target_clean_rate || '0.60' }}
        run: |
          python scripts/sweep_case_quality.py \
            --triage-seeds "$TRIAGE_SEEDS" \
            --target-clean-rate "$TARGET_CLEAN_RATE" \
            > reports/case-quality-triage.txt 2>&1

      - name: Upload case quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: case-quality-report
          path: reports/
          if-no-files-found: error
