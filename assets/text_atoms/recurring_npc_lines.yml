witness_lines:
  - "Back again, Detective?"
  - "We have met before, haven't we?"
  - "You look familiar, Detective."
  - "Funny seeing you here again."
  - "I remember you. That was a long night."
  - "You were on my last case."
  - "I did not expect to see you again."
  - "I know your face. Let's not do this twice."
  - "You were here before, weren't you?"
  - "I guess our paths cross again."
  - "I was hoping it wouldn't be you this time."
  - "You handled my last statement."
  - "You again. Different day, same room."
  - "I recognize you. You asked me questions last time."
  - "We have done this before."
  - "I recognized the notebook before you said a word."
  - "You bring the same mood with you every time."
  - "I remember the shoes. Detectives never notice the shoes."
  - "You always show up after the block has started talking."
  - "This city must be smaller than I thought if you keep finding me."
  - "You again. That means last time still isn't finished."
  - "I had a feeling this would come back to me, and here you are."
  - "You have the same look you had last time, only tireder."
  - "I was hoping this would not come back around so soon."
  - "We keep meeting on bad nights. That feels unfair to both of us."
partner_lines:
  - "We have dealt with them before. Keep it clean."
  - "Same face, new file."
  - "We ran into them on the last case."
  - "Looks like a repeat contact."
  - "They know the routine. That cuts both ways."
  - "Let me handle the opening. They remember us."
  - "They've seen our badge before. That buys efficiency, not trust."
  - "Careful. Familiar witnesses edit themselves faster."
  - "Repeat contact means shorter patience and longer memory."
  - "They know the routine. Do not let them steer the conversation."
  - "Same witness, different case. Read the room first."
  - "If they remember us, they remember the cost too."
  - "Let the familiar face work for us before it works against us."
  - "They know what a statement becomes once it leaves the room."
detective_lines:
  - "We have met before. I need straight answers."
  - "You remember me. I remember you."
  - "We spoke last time. Start from the beginning."
  - "This is familiar. Help me keep it clean."
  - "We crossed paths before. Tell me what changed."
  - "You know my face. Use that to save us both some time."
  - "Last time made you cautious. This time I need you to be clear."
  - "We have done this before. Skip the warm-up."
  - "You know how this works. I need the version you can defend tomorrow."
  - "Knowing my face does not make this easier. Start with what matters."
