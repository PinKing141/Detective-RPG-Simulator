phrases:
  - "The rain hit the pavement like a verdict."
  - "The alley smelled like old secrets."
  - "Neon bled across the puddles and made every lie look dressed for evening."
  - "The block kept its own counsel, like every witness worth worrying about."
  - "The city never slept; it just muttered to itself in the dark."
  - "Streetlight glare made the storefront glass look like a one-way confession."
  - "Every doorway on the strip looked tired, stained, and open to the wrong kind of business."
  - "The night air carried smoke, wet brick, and the kind of patience that makes trouble bold."
  - "Rainwater crawled along the curb like it wanted out of the neighborhood."
  - "The windows upstairs were dark, but not innocent."
  - "Taxi spray stitched the avenue together with dirty silver thread."
  - "Some neighborhoods breathe; this one watched."
  - "A siren passed three streets over and the whole block pretended not to hear it."
  - "The sidewalk shone like a knife somebody had tried to wipe clean."
  - "Steam climbed out of the grates like the city was trying to hide its face."
  - "The buildings leaned over the street the way bad memories lean over a drink."
  - "The hour had gone past tired and into mean."
  - "A cheap sign buzzed overhead like it had its own grievance."
  - "Even the quiet felt like it was working an angle."
  - "The room held on to cigarette ghosts and last chances."
  - "Everything smelled scrubbed, which only made it look guiltier."
  - "The cold in the hallway felt cheap, temporary, and mean."
  - "A bad night can make ordinary furniture look like part of the story."
  - "The city wore its grime like a uniform and its silence like a threat."
  - "Every shadow in the stairwell looked like it belonged there more than I did."
  - "The door clicked shut with the confidence of a lie rehearsed too often."
  - "Midnight had settled in, heavy as a pawnshop overcoat."
  - "The block looked washed clean until you got close enough to read the stains."
  - "Even the honest lights flickered in this part of town."
  - "The place felt one bad decision past repair."
  - "A damp wind moved through the street like a rumor changing hands."
  - "The city kept score in rust, rent, and the things people swallowed to get through the week."
  - "Nothing about the room shouted. It just kept insisting."
  - "You could hear the plumbing complain behind the walls like it had been through this before."
  - "The night pressed its thumb on everything and waited to see what bruised first."
  - "The corridor held the smell of bleach, old heat, and somebody else's fear."
  - "From the curb, the whole building looked like it was trying not to be remembered."
  - "The avenue hummed with late money and earlier mistakes."
  - "It was the kind of hour when decent people stay home and everyone else gets clearer."
  - "The silence around the scene had edges on it."
  - "The rain made every footprint look temporary and every stain look permanent."
