lines:
  - "I was on the corner when it happened."
  - "I heard arguing from the alley."
  - "I saw someone leave in a hurry."
  - "I saw a tall figure by the door."
  - "I noticed a light on around midnight."
  - "I heard glass break, then footsteps."
  - "I passed by and saw the door ajar."
  - "I saw two people talking near the entrance."
  - "I heard a car start and speed off."
  - "I was upstairs; the walls are thin."
  - "I smelled smoke for a moment."
  - "I saw someone carrying a bag."
  - "I heard a thud, like something heavy."
  - "I saw a person pacing outside."
  - "I heard a short scream, then silence."
  - "I saw a coat hanging open and wet."
  - "I noticed the street was empty."
  - "I saw a shadow move past the window."
  - "I heard a door slam."
  - "I saw someone wipe the handle."
  - "I heard footsteps running away."
  - "I saw a figure in a hood."
  - "I heard a low voice near the stairs."
  - "I was closing up when I saw a light flicker."
  - "I saw a person with gloves."
  - "I heard a phone ring inside."
  - "I saw a car parked with engine running."
  - "I heard a knock, then raised voices."
  - "I saw someone looking around nervously."
  - "I noticed the back gate was open."
  - "I heard metal clatter on the ground."
  - "I saw a person on the fire escape."
  - "I heard a long pause and then a shout."
  - "I saw a face through the rain."
  - "I noticed someone leaving through the side door."
  - "I heard a dog barking nonstop."
  - "I saw two people arguing in the street."
  - "I noticed fresh scratches on the lock."
  - "I heard someone say a name, then silence."
  - "I saw someone stand by the mailbox."
  - "I noticed a broken bottle near the curb."
  - "I heard heavy breathing close by."
  - "I saw a person lean into the window."
  - "I noticed a chair tipped over."
  - "I heard a short struggle and then a car door."
  - "I saw someone drop something and pick it up."
  - "I noticed the lights go out suddenly."
  - "I heard footsteps on the stairs."
  - "I saw a person exit and check the street."
  - "I heard the back door creak."
  - "I saw the hallway light blink once and stay dead."
  - "I heard somebody trying not to run."
  - "I saw someone pause like they were listening through the wall."
  - "I noticed the front step was wet except for one dry patch."
  - "I heard keys jolt against a rail."
  - "I saw a face turn away before the light caught it."
  - "I noticed a coat collar pulled up too high for the weather."
  - "I heard a voice go flat, then vanish."
  - "I saw someone cross the street without looking at traffic."
  - "I noticed the side gate move and then settle."
  - "I heard someone curse under their breath."
  - "I saw a figure stop under the awning and wait."
  - "I noticed one window brighten and another go dark."
  - "I heard a scrape like furniture pushed the wrong way."
  - "I saw someone come out looking calmer than the street around them."
  - "I noticed rainwater tracking in where the floor should have been dry."
  - "I heard two knocks, a pause, then nothing."
  - "I saw a hand pull the curtain aside and let it fall."
  - "I noticed somebody keeping to the wall instead of the sidewalk."
  - "I heard a stair tread complain and then stay quiet."
  - "I saw someone watch the building before they watched the street."
  - "I noticed a car circle once and come back slow."
  - "I heard something small hit tile and spin."
  - "I saw a figure freeze when the bus lights washed over them."
  - "I noticed the mailboxes rattling after the hallway emptied."
  - "I heard somebody speak like they were trying not to be overheard."
  - "I saw a person leave by the clean route, like they had planned it."
  - "I noticed the latch catch twice before the door closed."
  - "It went quiet all of a sudden, like everybody knew something had gone wrong."
  - "I saw someone stand in the rain without hurrying."
neighbor_lines:
  - "I noticed the hallway go quiet before anyone opened a door."
  - "I heard a knock sharp enough to make the whole floor listen."
  - "I saw someone use the tenant entrance like they already knew the building."
  - "I heard a voice echo in the stairwell after the speaker was gone."
  - "I heard movement pause right outside the apartment and then choose a direction."
  - "I saw someone check the dark end of the hall before they checked the lock."
  - "I noticed the shared door close very carefully, like somebody did not want to be heard."
  - "I heard the floorboards carry more weight than one ordinary trip upstairs."
staff_lines:
  - "I was closing up when the block stopped feeling normal."
  - "I noticed somebody moving like they expected the cameras before they saw them."
  - "I saw someone use the side access like they already knew it."
  - "I heard the back area go quiet all at once, and that usually means trouble."
  - "I saw a face do the quick calculation people make before they lie to staff."
  - "I noticed someone avoid the lit path and choose the service route instead."
  - "I heard a voice go professional and then turn cold."
  - "I saw someone leave trying to look ordinary, and it did not quite work."
passerby_lines:
  - "I was only passing through, but even from the curb the scene felt wrong."
  - "I saw someone cut across the block like they wanted distance more than speed."
  - "I heard something break the rhythm of the street, but I looked over too late."
  - "I noticed one person moving against the crowd like they expected everyone else to move first."
  - "I saw someone come off the corner looking too put-together for that hour."
  - "I heard raised voices, then traffic swallowed them."
  - "I noticed a figure hesitate at the edge of the light and keep going anyway."
  - "I saw somebody leave with the kind of focus that makes strangers memorable."
intimate_lines:
  - "I knew the sound of their anger before I knew which room it was coming from."
  - "I heard the voice change the way it does when fear is trying to sound calm."
  - "I saw the moment turn wrong before I understood how wrong."
  - "I knew something had shifted because the silence afterward felt wrong."
  - "I heard pain in the room before I heard violence."
  - "I could see it in the way they carried themselves before they reached the door."
  - "I noticed the kind of hesitation people only show when history is already in the room."
  - "I heard a familiar voice go flat and hard to recognize."
